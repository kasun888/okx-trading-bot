name: 🤖 IG Forex + Gold Bot

on:
  schedule:
    # Every 5 mins 24hrs Mon-Fri (UTC)
    # Monday 5am SGT = Sunday 21:00 UTC
    # Friday 5am SGT = Thursday 21:00 UTC
    - cron: '*/5 * * * 0-4'   # Sun-Thu UTC = Mon-Fri SGT
    - cron: '*/5 21-23 * * 0' # Sunday 21-23 UTC = Monday 5am+ SGT
    - cron: '*/5 0-23 * * 1-4' # Mon-Thu UTC = Tue-Fri SGT
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🤖 Run IG Trading Bot
        env:
          IG_USERNAME:      ${{ secrets.IG_USERNAME }}
          IG_PASSWORD:      ${{ secrets.IG_PASSWORD }}
          IG_API_KEY:       ${{ secrets.IG_API_KEY5 }}
          IG_ACC_NUMBER:    ${{ secrets.IG_ACC_NUMBER }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: 💾 Save trade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ig-trade-logs-${{ github.run_number }}
          path: |
            trades_*.json
            performance_log.txt
          retention-days: 30
